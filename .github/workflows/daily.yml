name: Daily Market Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 1-5'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        env:
          FRED_API_KEY:   ${{ secrets.FRED_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          OUTPUT_DIR:     ./docs
        run: |
          mkdir -p docs
          python cycle_analysis.py --no-browser --outdir ./docs

      - name: Rename to index.html
        run: |
          cd docs
          ls *.html
          mv $(ls cycle_analysis_*.html | head -1) index.html

      - name: Push report
        run: |
          git config user.name "Market Intel Bot"
          git config user.email "bot@marketintel.io"
          git pull origin main
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Daily report $(date +'%Y-%m-%d')"
          git push origin main
